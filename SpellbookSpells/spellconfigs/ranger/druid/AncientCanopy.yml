description:
  en:
  - <!i><#757575>Druid | Ultimate
  - ' '
  - <#94958B>Call down an ancient sanctuary that protects allies
  - <#94958B>and punishes enemies beneath its living canopy.
  - ' '
  - '<#62D106>✦ Seeded: <#94958B>Every pulse converts Seeded stacks into'
  - <#94958B>burst healing for allies or rootlash damage for enemies.
  - ' '
  - '<#FFD700>✦ Sanctuary Pulses:'
  - '  <#94958B>• Allies gain healing and Resistance.'
  - '  <#94958B>• Seeded allies also gain brief Stability.'
  - '  <#94958B>• Enemies are damaged and slowed.'
  - ' '
  - '<!i><yellow>⌚ <#94958B>Cooldown: <arg:0>s'
  - '<!i><yellow>⚡ <#94958B>Mana: <arg:1>'
  - '<!i><yellow>📏 <#94958B>Range: <arg:2> blocks'
  - '<!i><yellow>◎ <#94958B>Radius: <arg:5> blocks'
  - '<!i><yellow>⏱️ <#94958B>Duration: <arg:3>s'
  - '<!i><yellow>✚ <#94958B>Heal per Pulse: <arg:16>'
  - '<!i><yellow>✦ <#94958B>Damage per Pulse: <arg:17>'
  de:
  - <!i><#757575>Druide | Ultimate
  - ' '
  - <#94958B>Rufe ein uraltes Schutzdach herab, das Verbuendete schuetzt
  - <#94958B>und Feinde unter seinem lebenden Dach bestraft.
  - ' '
  - '<#62D106>✦ Saat: <#94958B>Jeder Puls wandelt Saat-Stapel in'
  - <#94958B>Heilung fuer Verbuendete oder Rankenschaden fuer Feinde um.
  - ' '
  - '<#FFD700>✦ Schutzpulse:'
  - '  <#94958B>• Verbuendete erhalten Heilung und Resistenz.'
  - '  <#94958B>• Besaete Verbuendete erhalten kurz Stabilitaet.'
  - '  <#94958B>• Feinde erleiden Schaden und Verlangsamung.'
  - ' '
  - '<!i><yellow>⌚ <#94958B>Abklingzeit: <arg:0>s'
  - '<!i><yellow>⚡ <#94958B>Mana: <arg:1>'
  - '<!i><yellow>📏 <#94958B>Reichweite: <arg:2> Bloecke'
  - '<!i><yellow>◎ <#94958B>Radius: <arg:5> Bloecke'
  - '<!i><yellow>⏱️ <#94958B>Dauer: <arg:3>s'
  - '<!i><yellow>✚ <#94958B>Heilung pro Puls: <arg:16>'
  - '<!i><yellow>✦ <#94958B>Schaden pro Puls: <arg:17>'
