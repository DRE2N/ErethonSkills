description:
  en:
  - <!i><#757575>Druid
  - ' '
  - <#94958B>Create a spirit grove at the target location.
  - <#94958B>Each pulse heals allies and wears down enemies inside.
  - ' '
  - '<#62D106>✦ Seeded: <#94958B>Pulses consume Seeded stacks for'
  - <#94958B>stronger healing, stronger damage and longer slows.
  - ' '
  - '<!i><yellow>⌚ <#94958B>Cooldown: <arg:0>s'
  - '<!i><yellow>⚡ <#94958B>Mana: <arg:1>'
  - '<!i><yellow>📏 <#94958B>Range: <arg:2> blocks'
  - '<!i><yellow>◎ <#94958B>Radius: <arg:4> blocks'
  - '<!i><yellow>⏱️ <#94958B>Duration: <arg:3>s'
  - '<!i><yellow>✚ <#94958B>Heal per Pulse: <arg:18>'
  - '<!i><yellow>✦ <#94958B>Damage per Pulse: <arg:19>'
  de:
  - <!i><#757575>Druide
  - ' '
  - <#94958B>Erschaffe an der Zielposition einen Geisterhain.
  - <#94958B>Jeder Puls heilt Verbuendete und zermuerbt Feinde im Inneren.
  - ' '
  - '<#62D106>✦ Saat: <#94958B>Pulse verbrauchen Saat-Stapel fuer'
  - <#94958B>staerkere Heilung, mehr Schaden und laengere Verlangsamung.
  - ' '
  - '<!i><yellow>⌚ <#94958B>Abklingzeit: <arg:0>s'
  - '<!i><yellow>⚡ <#94958B>Mana: <arg:1>'
  - '<!i><yellow>📏 <#94958B>Reichweite: <arg:2> Bloecke'
  - '<!i><yellow>◎ <#94958B>Radius: <arg:4> Bloecke'
  - '<!i><yellow>⏱️ <#94958B>Dauer: <arg:3>s'
  - '<!i><yellow>✚ <#94958B>Heilung pro Puls: <arg:18>'
  - '<!i><yellow>✦ <#94958B>Schaden pro Puls: <arg:19>'
